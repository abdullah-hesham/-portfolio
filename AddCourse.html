<!DOCTYPE html>
<html>
<head>
    <title>Add Course | Course Organizer</title>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="Index.css".css">
</head>

<body>

<header class="header">

    <nav class="navbar">
        <div class="logo">Course Organizer</div>

        <ul class="navlinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="MyCourses.html">My Courses</a></li>
            <li><a href="AddCourse.html">Add Course</a></li>
            <li><a href="Contact.html">Contact Us</a></li>
        </ul>
    </nav>
    <h1 id="headertextcenter">Add New Course</h1>
    <p id="headertextcenter">
        Fill in the details below to add a new course to your organizer.
    </p>
</header>
<main>
    <h3 id="MyCourses">Fill in course details</h3>
     <section class="form-container">

        <input type="text" placeholder="Course Name">
        <input type="text" placeholder="Instructor Name">
        <input type="number" placeholder="Credit Hours">

        <select>
            <option>Current Stage</option>
            <option>Planned</option>
            <option>In Progress</option>
            <option>Completed</option>
        </select>

        <button class="buttons">Add Course</button>

    </section>

</main>

<footer>
    <div class="footercontent">
        <p>© 2026 Course Organizer</p>
        <p>Designed & Developed by Abdullah</p>
    </div>
</footer>
